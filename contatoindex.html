    <h2>Fale Conosco 💬</h2>
    
    <main>
      <section>
      <fieldset>
        <center>
    <form>
      <label>Nome:</label><br>
      <input type="text" name="nome" required placeholder="Exemplo da Silva"><br><br>

    
      <label>Email:</label><br>
      <input type="email" name="email" required placeholder="Exemplo@Gmail.com"><br><br>
      <label>Telefone:</label><br>
      <input type="tel" name="telefone" placeholder="(00) 0000-0000" pattern="\([0-9]{2}\)\s?[0-9]{4,5}-[0-9]{4}"><br><br>


    
    
      <label>Assunto:</label><br>
      <select name="assunto">
        <option>Selecione</option>
        <option>Dúvidas</option>
        <option>Envie sua Opnião</option>
        <option>Sugestões</option>
        <option>Outro assunto</option>
      </select><br>

      <label>Mensagem:</label><br>
      <textarea name="mensagem" rows="5" cols="30"></textarea><br><br>

    
      <input type="checkbox" name="newsletter">
      <label>Desejo receber novidades?</label><br><br>

    
      <input type="submit" value="Enviar">
      <input type="reset" value="Limpar">

    </form>
